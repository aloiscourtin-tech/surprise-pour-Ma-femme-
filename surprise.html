<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une surprise pour toi ❤️</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
        }
        canvas {
            display: block;
        }
        .message {
            position: absolute;
            bottom: 20%;
            color: white;
            font-size: 2rem;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="message">Pour ma chérie ❤️</div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;

        function drawHeart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 - 50;

            // Calcul de la pulsation
            time += 0.05;
            const pulse = Math.sin(time) * 5;
            const scale = 15 + pulse; // Taille de base du cœur

            ctx.beginPath();
            ctx.fillStyle = "#dc143c";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#dc143c";

            // Dessin du cœur via équation paramétrique
            for (let t = 0; t <= Math.PI * 2; t += 0.01) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

                const drawX = centerX + x * scale;
                const drawY = centerY + y * scale;

                if (t === 0) ctx.moveTo(drawX, drawY);
                else ctx.lineTo(drawX, drawY);
            }

            ctx.fill();
            requestAnimationFrame(drawHeart);
        }

        drawHeart();
    </script>
</body>
</html>
